name: ts_schema_codegen
description: >-
  Generate Dart code from a TypeScript data schema. Evaluates the TS entry
  file with Deno at build time and emits typed Dart constants via build_runner.
version: 0.1.0
publish_to: none
environment:
  sdk: ^3.4.0

dependencies:
  build: '>=2.4.0 <5.0.0'
  path: ^1.9.0

dev_dependencies:
  build_runner: ^2.4.15
  build_test: ^2.2.0
  test: ^1.25.0
  lints: ^4.0.0
